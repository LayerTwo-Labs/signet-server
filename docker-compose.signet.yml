# Project name carries the signet version, so each version gets its own
# (project-scoped) data volume -- a new version is a clean slate, no wipe needed.
name: signet-server-${SIGNET_VERSION}

services:
  mainchain:
    profiles:
      - signet

    volumes: [mainchain-data:/home/drivechain/.drivechain]

  enforcer:
    profiles:
      - signet

    secrets:
      - source: bitcoind-signet-cookie
        target: /daemon-dir/.cookie

  thunder:
    profiles:
      - signet

  truthcoin:
    profiles:
      - signet

  coinshift:
    profiles:
      - signet

  romanzelectrs:
    profiles:
      - signet
    ports:
      - 50061:50001 # Electrum port

  electrs:
    profiles:
      - signet

    secrets:
      - source: bitcoind-signet-cookie
        target: /daemon-dir/signet/.cookie

  mempool-db:
    profiles:
      - signet

  mempool-web:
    profiles:
      - signet

  mempool-api:
    secrets:
      - source: bitcoind-signet-cookie
        target: /daemon-dir/.cookie

    # conf: https://github.com/mempool/mempool/blob/e3c3f31ddbf9543db12ef4f7e5032566757d31f9/backend/mempool-config.sample.json#
    environment:
      MEMPOOL_NETWORK: signet

  fast-withdraw-server:
    profiles:
      - signet

  faucet-backend:
    profiles:
      - signet

  faucet-frontend:
    profiles:
      - signet

  coinnews:
    profiles:
      - signet

# Paths to secrets refer to the (remote) host machine.
secrets:
  # IMPORTANT: this needs to be a file WITHOUT a trailing newline
  bitcoind-signet-cookie:
    file: /data/secrets/bitcoind-signet-cookie.txt

  bitcoind-signet-rpcauth.conf:
    file: /data/secrets/bitcoind-signet-rpcauth.conf
